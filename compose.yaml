networks:
  default:
    name: kubecon-eu-2026
    driver: bridge

services:
  # =============================================================================
  # Auto-instrumented services
  # =============================================================================
  songs-spring-auto:
    container_name: songs-spring-auto
    build:
      context: ./src/auto-instrumentation/spring-auto
    ports:
      - 8080:8080
    environment:
      - JAVA_TOOL_OPTIONS=-javaagent:/app/opentelemetry-javaagent.jar -Xms490m -Xmx490m
      - MUSIC_SERVICE_URL=https://musicbrainz.org/ws/2/recording/
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=songs-spring-auto
      - OTEL_RESOURCE_ATTRIBUTES=service.version=0.0.1
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - SPRING_DATASOURCE_URL=jdbc:postgresql://songs-db:5432/songs_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_DATASOURCE_DRIVER-CLASS-NAME=org.postgresql.Driver
    depends_on:
      otel-collector:
        condition: service_healthy
      songs-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 650M
    profiles:
      - auto
      - spring-auto

  songs-express-auto:
    container_name: songs-express-auto
    build:
      context: ./src/auto-instrumentation/express-auto
    ports:
      - 3000:3000
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=songs-express-auto
      - OTEL_RESOURCE_ATTRIBUTES=service.version=0.0.1
      - DB_HOST=songs-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=songs_db
      - MUSIC_SERVICE_URL=https://musicbrainz.org/ws/2/recording/
    depends_on:
      otel-collector:
        condition: service_healthy
      songs-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 200M
    profiles:
      - auto
      - express-auto

  # =============================================================================
  # Manual-instrumented services
  # =============================================================================
  songs-spring-manual:
    container_name: songs-spring-manual
    build:
      context: ./src/manual-instrumentation/spring-manual
    ports:
      - 8081:8080
    environment:
      - JAVA_TOOL_OPTIONS=-Xms490m -Xmx490m
      - MUSIC_SERVICE_URL=https://musicbrainz.org/ws/2/recording/
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=songs-spring-manual
      - OTEL_RESOURCE_ATTRIBUTES=service.version=0.0.1
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - SPRING_DATASOURCE_URL=jdbc:postgresql://songs-db:5432/songs_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_DATASOURCE_DRIVER-CLASS-NAME=org.postgresql.Driver
    depends_on:
      otel-collector:
        condition: service_healthy
      songs-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 650M
    profiles:
      - manual
      - spring-manual

  songs-express-manual:
    container_name: songs-express-manual
    build:
      context: ./src/manual-instrumentation/express-manual
    ports:
      - 3001:3000
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=songs-express-manual
      - OTEL_RESOURCE_ATTRIBUTES=service.version=0.0.1
      - OTEL_NODE_RESOURCE_DETECTORS=env
      - DB_HOST=songs-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=songs_db
      - MUSIC_SERVICE_URL=https://musicbrainz.org/ws/2/recording/
    depends_on:
      otel-collector:
        condition: service_healthy
      songs-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    profiles:
      - manual
      - express-manual

  # =============================================================================
  # Uninstrumented services (no OTel, baseline for benchmarking)
  # =============================================================================
  songs-spring-uninstrumented:
    container_name: songs-spring-uninstrumented
    build:
      context: ./src/uninstrumented/spring-uninstrumented
    ports:
      - 8082:8080
    environment:
      - JAVA_TOOL_OPTIONS=-Xms490m -Xmx490m
      - MUSIC_SERVICE_URL=https://musicbrainz.org/ws/2/recording/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://songs-db:5432/songs_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_DATASOURCE_DRIVER-CLASS-NAME=org.postgresql.Driver
    depends_on:
      songs-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 650M
    profiles:
      - uninstrumented
      - spring-uninstrumented

  songs-express-uninstrumented:
    container_name: songs-express-uninstrumented
    build:
      context: ./src/uninstrumented/express-uninstrumented
    ports:
      - 3002:3000
    environment:
      - DB_HOST=songs-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=songs_db
      - MUSIC_SERVICE_URL=https://musicbrainz.org/ws/2/recording/
    depends_on:
      songs-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 96M
    profiles:
      - uninstrumented
      - express-uninstrumented

  # =============================================================================
  # Shared infrastructure services
  # =============================================================================
  songs-db:
    container_name: songs-db
    image: postgres:18.3-alpine3.23
    ports:
      - 5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=songs_db
    volumes:
      - ./src/songs-db/init-songs-db.sh:/docker-entrypoint-initdb.d/init-songs-db.sh
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    profiles:
      - auto
      - manual
      - uninstrumented
      - spring-auto
      - spring-manual
      - spring-uninstrumented
      - express-auto
      - express-manual
      - express-uninstrumented

  jaeger:
    container_name: jaeger
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.15.1
    ports:
      - 16686:16686
      - 4317
      - 4318
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    profiles:
      - auto
      - manual
      - spring-auto
      - spring-manual
      - express-auto
      - express-manual

  otel-collector:
    container_name: otel-collector
    build:
      context: ./src/otel-collector
    command:
      - --config=/etc/otel-collector-config.yaml
    volumes:
      - ./src/otel-collector/otel-collector-config${OBSERVABILITY_BACKEND:+}-${OBSERVABILITY_BACKEND}.yaml:/etc/otel-collector-config.yaml
      - /:/hostfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 4317:4317 # OTLP gRPC
      - 4318:4318 # OTLP HTTP
      - 13133:13133 # Health check HTTP
    environment:
      - OBSERVABILITY_BACKEND
      - OTEL_COLLECTOR_HOST=otel-collector
      - OTEL_COLLECTOR_PORT_GRPC=4317
      - OTEL_COLLECTOR_PORT_HTTP=4318
      - DD_SITE_PARAMETER
      - DD_API_KEY
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/health/status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    profiles:
      - auto
      - manual
      - uninstrumented
      - spring-auto
      - spring-manual
      - spring-uninstrumented
      - express-auto
      - express-manual
      - express-uninstrumented
