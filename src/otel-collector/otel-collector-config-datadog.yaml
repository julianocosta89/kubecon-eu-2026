extensions:
  healthcheckv2:
    use_v2: true
    component_health:
      include_permanent_errors: false
      include_recoverable_errors: true
      recovery_duration: 5m
    http:
      endpoint: "localhost:13133"
      status:
        enabled: true
        path: "/health/status"
  datadog/extension:
    api:
      site: ${DD_SITE_PARAMETER}
      key: ${DD_API_KEY}
    http:
      endpoint: "localhost:9875"
      path: "/metadata"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_GRPC}
      http:
        endpoint: ${env:OTEL_COLLECTOR_HOST}:${env:OTEL_COLLECTOR_PORT_HTTP}

processors:
  resource:
    attributes:
      - key: deployment.environment.name
        value: "dev"
        action: upsert

connectors:
  datadog/connector:
    traces:
      compute_stats_by_span_kind: true

exporters:
  debug:
  # verbosity: detailed
  datadog:
    traces:
      compute_stats_by_span_kind: true
    api:
      site: ${DD_SITE_PARAMETER}
      key: ${DD_API_KEY}
    sending_queue:
      batch:
        min_size: 10
        max_size: 100
        flush_timeout: 10s
  otlp_grpc/jaeger:
    endpoint: "http://jaeger:4317"
    tls:
      insecure: true
    sending_queue:
      batch:


service:
  extensions: [healthcheckv2, datadog/extension]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource]
      exporters: [debug, datadog/connector, datadog, otlp_grpc/jaeger]
    metrics:
      receivers: [otlp, datadog/connector]
      processors: [resource]
      exporters: [datadog]
    logs:
      receivers: [otlp]
      processors: [resource]
      exporters: [datadog]
